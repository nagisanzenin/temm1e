# TEMM1E Default Configuration
# Cloud-native Rust AI agent runtime — Telegram-native

[temm1e]
mode = "auto"  # "cloud" | "local" | "auto"
tenant_isolation = false

[gateway]
host = "127.0.0.1"
port = 8080
tls = false

# Provider is auto-configured via Telegram onboarding.
# Or set manually here to skip onboarding:
[provider]
# name = "anthropic"
# api_key = "your-api-key-here"
# model = "claude-sonnet-4-6"

[memory]
backend = "sqlite"

[memory.search]
vector_weight = 0.7
keyword_weight = 0.3

[vault]
backend = "local-chacha20"

[filestore]
backend = "local"

[security]
sandbox = "mandatory"
file_scanning = true
skill_signing = "required"
audit_log = true

[heartbeat]
enabled = false
interval = "30m"
checklist = "HEARTBEAT.md"

[cron]
storage = "sqlite"

[tools]
shell = true
browser = true
file = true
git = true
cron = true
http = true

[observability]
log_level = "info"
otel_enabled = false

# X-Mind — Multi-faculty cognitive architecture.
# Extends consciousness with specialized concurrent minds (Architect, Analyst, Sentinel).
# OFF by default. Enable to run multiple cognitive faculties concurrently.
[x_minds]
enabled = false
token_budget = 500           # Max total tokens for all mind injections combined
mind_timeout_secs = 10       # Per-mind LLM call timeout
architect_enabled = true     # Architecture observer mind
analyst_enabled = true       # Logical analysis mind
sentinel_enabled = true      # Safety/security monitor mind

# Telegram channel — set your bot token here or via TELEGRAM_BOT_TOKEN env var
[channel.telegram]
enabled = true
token = "${TELEGRAM_BOT_TOKEN}"
allowlist = []
file_transfer = true
