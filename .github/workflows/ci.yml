name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1

jobs:
  # -----------------------------------------------
  # Job 1: Code quality (fmt + clippy)
  # -----------------------------------------------
  check:
    name: Check (fmt + clippy)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: stable
          components: rustfmt, clippy

      - uses: Swatinem/rust-cache@v2

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libwayland-dev libxcb1-dev libxcb-randr0-dev libxcb-shm0-dev libxkbcommon-dev libpipewire-0.3-dev libspa-0.2-dev libclang-dev libegl1-mesa-dev libgbm-dev libdrm-dev libxdo-dev

      - name: Check formatting
        run: cargo fmt --all -- --check

      - name: Run clippy
        run: cargo clippy --workspace --all-targets --all-features -- -D warnings

  # -----------------------------------------------
  # Job 2: Tests
  # -----------------------------------------------
  test:
    name: Test
    runs-on: ubuntu-latest
    needs: check
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: stable

      - uses: Swatinem/rust-cache@v2

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libwayland-dev libxcb1-dev libxcb-randr0-dev libxcb-shm0-dev libxkbcommon-dev libpipewire-0.3-dev libspa-0.2-dev libclang-dev libegl1-mesa-dev libgbm-dev libdrm-dev libxdo-dev

      - name: Run tests
        run: cargo test --workspace

  # -----------------------------------------------
  # Job 2b: Windows cross-platform gate — fmt + clippy + test on windows-latest
  #
  # Proves that Temm1e compiles and its unit tests pass on Windows. Added in
  # v5.4.5 as part of GH-50 / GH-51 Windows support. Intentionally NOT marked
  # as `needs: check` — runs independently of the Linux pipeline so a Windows
  # regression doesn't block Linux-only releases, and vice versa.
  #
  # Scope:
  # - All default features except desktop-control (xcap/enigo need Linux
  #   system libs that don't apply on Windows; desktop support on Windows is
  #   tracked separately). We build with --no-default-features + the Windows-
  #   compatible feature subset to keep the gate fast and focused.
  # - Tests that spawn real Chrome are skipped automatically (no Chrome
  #   preinstalled on windows-latest; cfg-gated or ignored in the test body).
  # - `continue-on-error: true` during the initial Windows rollout — surfaces
  #   any Windows-only issues without blocking main-branch CI. Flip to `false`
  #   once green for a full pipeline.
  # -----------------------------------------------
  test-windows:
    name: Test (windows-latest)
    runs-on: windows-latest
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: stable
          components: rustfmt, clippy

      - uses: Swatinem/rust-cache@v2
        with:
          key: windows-latest

      - name: Check formatting
        run: cargo fmt --all -- --check

      - name: Run clippy (default features, skip desktop-control)
        shell: bash
        run: |
          cargo clippy --workspace --all-targets \
            --no-default-features \
            --features telegram,discord,browser,mcp,codex-oauth,tui \
            -- -D warnings

      - name: Run tests (default features, skip desktop-control)
        shell: bash
        run: |
          cargo test --workspace \
            --no-default-features \
            --features telegram,discord,browser,mcp,codex-oauth,tui

  # -----------------------------------------------
  # Job 3a: Build musl release binary (servers, no desktop control)
  # -----------------------------------------------
  build-musl:
    name: Build (musl — server)
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-unknown-linux-musl

      - uses: Swatinem/rust-cache@v2
        with:
          key: x86_64-unknown-linux-musl

      - name: Install musl tools
        run: sudo apt-get update && sudo apt-get install -y musl-tools

      - name: Build release binary (no desktop-control — musl can't link wayland/xcb)
        run: |
          cargo build --release --target x86_64-unknown-linux-musl --bin temm1e \
            --no-default-features \
            --features telegram,discord,browser,mcp,codex-oauth,tui,openssl-vendored

      - name: Check binary size (<35 MB)
        run: |
          BINARY="target/x86_64-unknown-linux-musl/release/temm1e"
          SIZE=$(stat -c%s "$BINARY")
          SIZE_MB=$(echo "scale=2; $SIZE / 1048576" | bc)
          echo "Binary size: ${SIZE_MB} MB ($SIZE bytes)"
          # 35 MB threshold — bumped from 30 MB in v4.9.0 to accommodate
          # Eigen-Tune (temm1e-distill ~9.4K LOC of statistical machinery,
          # state machine, store, trainer, evaluator, backends).
          if [ "$SIZE" -gt 36700160 ]; then
            echo "::error::Binary size ${SIZE_MB} MB exceeds 35 MB limit"
            exit 1
          fi
          echo "Binary size OK: ${SIZE_MB} MB"

      - name: Upload binary artifact
        uses: actions/upload-artifact@v4
        with:
          name: temm1e-x86_64-linux
          path: target/x86_64-unknown-linux-musl/release/temm1e
          retention-days: 7

  # -----------------------------------------------
  # Job 3b: Build glibc release binary (desktops, WITH desktop control)
  # -----------------------------------------------
  build-glibc:
    name: Build (glibc — desktop)
    runs-on: ubuntu-24.04    # glibc 2.39 — runs on Ubuntu 24.04+. Needs PipeWire 0.3.65+ headers.
    needs: test
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2
        with:
          key: x86_64-unknown-linux-gnu

      - name: Install desktop-control system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            pkg-config \
            libclang-dev \
            libwayland-dev \
            libxcb1-dev \
            libxcb-randr0-dev \
            libxcb-shm0-dev \
            libxkbcommon-dev \
            libpipewire-0.3-dev \
            libspa-0.2-dev \
            libegl1-mesa-dev \
            libgbm-dev \
            libdrm-dev \
            libxdo-dev \
            libdbus-1-dev \
            libxrandr-dev

      - name: Build release binary (all default features including desktop-control)
        run: cargo build --release --bin temm1e

      - name: Check binary size (<35 MB)
        run: |
          BINARY="target/release/temm1e"
          SIZE=$(stat -c%s "$BINARY")
          SIZE_MB=$(echo "scale=2; $SIZE / 1048576" | bc)
          echo "Binary size: ${SIZE_MB} MB ($SIZE bytes)"
          echo "Binary size: ${SIZE_MB} MB"

      - name: Upload binary artifact
        uses: actions/upload-artifact@v4
        with:
          name: temm1e-x86_64-linux-desktop
          path: target/release/temm1e
          retention-days: 7

  # -----------------------------------------------
  # Job 4: Docker image build
  # -----------------------------------------------
  docker:
    name: Docker Build
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: false
          tags: temm1e:ci-${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Check image size (<50 MB)
        run: |
          docker buildx build --load -t temm1e:size-check .
          SIZE=$(docker image inspect temm1e:size-check --format='{{.Size}}')
          SIZE_MB=$(echo "scale=2; $SIZE / 1048576" | bc)
          echo "Image size: ${SIZE_MB} MB"
          if [ "$SIZE" -gt 52428800 ]; then
            echo "::warning::Docker image size ${SIZE_MB} MB exceeds 50 MB target"
          fi

  # -----------------------------------------------
  # Job 5: Security audit
  # -----------------------------------------------
  security:
    name: Security Audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: stable

      - name: Install cargo-audit
        run: cargo install cargo-audit --locked

      - uses: Swatinem/rust-cache@v2

      - name: Run cargo audit (advisory, non-blocking)
        run: cargo audit || echo "::warning::cargo audit found advisories (see above). These are in upstream transitive dependencies — review and update when patches are available."
